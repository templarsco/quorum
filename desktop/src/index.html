<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quorum</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Quorum</div>
      <div class="tag">Orchestrate agents. Ship code faster.</div>
    </header>
    <main class="container">
      <form id="task-form" class="task-form">
        <textarea id="task-input" rows="2" placeholder="Descreva sua tarefa em qualquer idioma…"></textarea>
        <button id="run-btn" type="submit">Run</button>
      </form>
      <section id="feed" class="feed"></section>
      <section id="result" class="result hidden">
        <div class="result-label">Resultado</div>
        <div id="result-text" class="result-text"></div>
      </section>
    </main>
  </body>
</html>
